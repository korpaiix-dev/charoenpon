services:
  postgres:
    image: postgres:15
    container_name: charoenpon-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-charoenpon}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: charoenpon-redis
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  sales-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: charoenpon-sales-bot
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      BOT_MODULE: bots.sales_bot
    command: python -m bots.sales_bot

  guardian-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: charoenpon-guardian-bot
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      BOT_MODULE: bots.guardian_bot
    volumes:
      - ./data:/app/data:ro
    command: python -m bots.guardian_bot

  admin-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: charoenpon-admin-bot
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      BOT_MODULE: bots.admin_bot
    command: python -m bots.admin_bot
    volumes:
      - ./data:/app/data:ro

  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: charoenpon-discord-bot
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    command: python -m discord_bot.main

  # content-scheduler: REMOVED — replaced by content-bot (มิน @jarernAD4_bot)

  finance-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: charoenpon-finance-scheduler
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    command: python -m agents.finance_agent

  monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: charoenpon-monitor
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    command: python -m agents.dev_agent monitor

  backup-cron:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: charoenpon-backup-cron
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATABASE: ${POSTGRES_DB:-charoenpon}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-charoenpon}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    command: python -m agents.dev_agent backup

  content-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: charoenpon-content-bot
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    command: python -m bots.content_bot

  manager-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: charoenpon-manager-agent
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      BOT_MODULE: agents.manager_agent
    command: python -m agents.manager_agent
    volumes:
      - ./data:/app/data:ro

  dashboard:
    container_name: charoenpon-dashboard
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "8010:8010"
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.env:/app/host.env
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      # Phase A.2 2026-06-27: mount frontend so JS/CSS/HTML changes
      # apply instantly without rebuild → zero-downtime for frontend edits
      - ./dashboard/frontend:/app/dashboard/frontend:ro
      # 2026-06-28: backend + shared as RO volume so uvicorn --reload picks up edits
      # without container rebuild → zero downtime to boss while we work
      - ./dashboard/backend:/app/dashboard/backend:ro
      - ./shared:/app/shared:ro
      - ./bots/relay_bot/data/state.json:/app/bots/relay_bot/data/state.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: ["uvicorn", "dashboard.backend.main:app", "--host", "0.0.0.0", "--port", "8010", "--reload", "--reload-dir", "/app/dashboard/backend", "--reload-dir", "/app/shared"]

  # fb-manager removed 2026-05-01: Facebook auto-post no longer used

  broadcast-worker:
    container_name: charoenpon-broadcast-worker
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m bots.broadcast_worker
    restart: always
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      BOT_TOKEN: ${SALES_BOT_TOKEN}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-charoenpon}

  gacha-api:
    build:
      context: ./services/gacha_api
      dockerfile: Dockerfile
    container_name: charoenpon-gacha-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:***REMOVED***@charoenpon-postgres:5432/charoenpon
    ports:
      - '127.0.0.1:8001:8001'

  dashboard-staging:
    # Added 2026-06-26: lightweight nginx serving static UI mockups + spec docs
    # for boss to preview the new dashboard design before implementation.
    # NO production code, NO DB access. Pure static HTML + markdown.
    image: nginx:alpine
    container_name: charoenpon-dashboard-staging
    restart: unless-stopped
    ports:
      - "8011:80"
    volumes:
      - ./dashboard-staging/public:/usr/share/nginx/html:ro
      - ./dashboard-staging/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dashboard-staging/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./dashboard-staging/docs:/usr/share/nginx/spec:ro


  dashboard-test:
    # Phase A.2 (2026-06-27): TEST MODE clone of dashboard on port 8012
    # ALL POST/PATCH/DELETE blocked → boss can click anything safely.
    # GET passes through → real data still visible.
    container_name: charoenpon-dashboard-test
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "8012:8010"
    env_file:
      - .env
    environment:
      DASHBOARD_TEST_MODE: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.env:/app/host.env
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - ./dashboard/frontend:/app/dashboard/frontend:ro
      - ./bots/relay_bot/data/state.json:/app/bots/relay_bot/data/state.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped


  # ──────────────────────────────────────────────────────────────────────────
  # Clip Poster Bot (2026-06-27): admin DM video → watermark + post FREE groups
  # ──────────────────────────────────────────────────────────────────────────
  clip-poster-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: charoenpon-clip-poster-bot
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      BOT_MODULE: bots.clip_poster_bot
      CLIP_POSTER_LOGO_PATH: /app/assets/clip_logo.png
    command: python -m bots.clip_poster_bot
    volumes:
      - ./assets:/app/assets

volumes:
  postgres_data:
    driver: local
