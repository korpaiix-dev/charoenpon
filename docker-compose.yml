services:
  postgres:
    image: postgres:15
    container_name: charoenpon-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-charoenpon}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  sales-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: charoenpon-sales-bot
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      BOT_MODULE: bots.sales_bot
    command: python -m bots.sales_bot

  guardian-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: charoenpon-guardian-bot
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      BOT_MODULE: bots.guardian_bot
    volumes:
      - ./data:/app/data:ro
    command: python -m bots.guardian_bot

  admin-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: charoenpon-admin-bot
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      BOT_MODULE: bots.admin_bot
    command: python -m bots.admin_bot
    volumes:
      - ./data:/app/data:ro

  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: charoenpon-discord-bot
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    command: python -m discord_bot.main

  # content-scheduler: REMOVED — replaced by content-bot (มิน @jarernAD4_bot)

  finance-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: charoenpon-finance-scheduler
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    command: python -m agents.finance_agent

  monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: charoenpon-monitor
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    command: python -m agents.dev_agent monitor

  backup-cron:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: charoenpon-backup-cron
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATABASE: ${POSTGRES_DB:-charoenpon}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-charoenpon}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    command: python -m agents.dev_agent backup

  content-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: charoenpon-content-bot
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    command: python -m bots.content_bot

  manager-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: charoenpon-manager-agent
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      BOT_MODULE: agents.manager_agent
    command: python -m agents.manager_agent
    volumes:
      - ./data:/app/data:ro

  dashboard:
    container_name: charoenpon-dashboard
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "8010:8010"
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.env:/app/host.env
      - ./docker-compose.yml:/app/docker-compose.yml:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # fb-manager removed 2026-05-01: Facebook auto-post no longer used

  broadcast-worker:
    container_name: charoenpon-broadcast-worker
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m bots.broadcast_worker
    restart: always
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      BOT_TOKEN: ${SALES_BOT_TOKEN}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-charoenpon}

volumes:
  postgres_data:
    driver: local
