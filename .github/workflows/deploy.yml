name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-charoenpon
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          # Long timeout because docker rebuild can take minutes
          command_timeout: 15m
          script: |
            set -e
            cd /root/charoenpon
            git fetch origin
            git reset --hard origin/master
            # Restart docker-compose stack (postgres, sales-bot, admin-bot,
            # content-bot, guardian-bot, discord-bot, finance-scheduler,
            # monitor, backup-cron, manager-agent, dashboard).
            # --build picks up Dockerfile changes; -d runs detached.
            docker compose up -d --build
            echo 'Charoenpon deploy OK — docker compose stack updated.'
