<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เจริญพร Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/css/style.css?v=2">
</head>
<body>
    <!-- Login Page -->
    <div id="login-page" class="login-page">
        <div class="login-card">
            <div class="login-logo">🙏</div>
            <h1 class="login-title">เจริญพร Dashboard</h1>
            <p class="login-subtitle">ระบบจัดการหลังบ้าน</p>
            <form id="login-form">
                <div class="form-group">
                    <label>Telegram ID</label>
                    <input type="text" id="login-tid" placeholder="เช่น 8502597269" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrap">
                        <input type="password" id="login-pwd" placeholder="รหัสผ่าน" required>
                        <button type="button" class="pwd-toggle" onclick="togglePassword()">👁</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full">เข้าสู่ระบบ</button>
                <div id="login-error" class="login-error"></div>
            </form>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="app hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-logo">🙏</span>
                <span class="sidebar-brand">เจริญพร</span>
                <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav">
                <!-- Generated by JS based on role -->
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <span id="sidebar-user-icon">👤</span>
                    <div>
                        <div id="sidebar-user-name" class="sidebar-user-name"></div>
                        <div id="sidebar-user-role" class="sidebar-user-role"></div>
                    </div>
                </div>
                <button class="btn btn-sm btn-outline" onclick="logout()">🚪 ออก</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <button class="hamburger" onclick="toggleSidebar()">☰</button>
                <h2 id="page-title" class="page-title">📊 ภาพรวม</h2>
                <div class="top-bar-right">
                    <span id="alert-badge" class="alert-badge hidden" onclick="navigate('finance')">🔔 <span id="alert-count">0</span></span>
                </div>
            </header>
            <div id="page-content" class="page-content">
                <!-- Dynamic content -->
            </div>
        </main>
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="modal-title"></h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>

    <script src="/js/app.js?v=3"></script>
</body>
</html>
