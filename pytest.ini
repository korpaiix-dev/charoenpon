[pytest]
testpaths = /app/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:cacheprovider
markers =
    regression: Tests สำหรับ bugs ที่เคยเจอ (Naca, FREE19, etc.)
    critical: Critical flow tests (payment, sub, link)
    slow: Tests ที่ใช้เวลา > 5 วินาที
